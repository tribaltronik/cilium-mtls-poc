# Kind cluster configuration for Cilium PoC
# Multi-node cluster: 1 control plane + 2 workers
# CNI disabled - Cilium will install its own
---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cilium-mtls-poc
networking:
  disableDefaultCNI: true
  podSubnet: 10.244.0.0/16
  serviceSubnet: 10.96.0.0/16

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role=control-plane"
        kubeProxyConfig:
          mode: "None"

  - role: worker
    labels:
      node-role: worker
      workload-type: frontend

  - role: worker
    labels:
      node-role: worker
      workload-type: backend
