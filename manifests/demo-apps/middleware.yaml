# Middleware service - Calls backend
---
apiVersion: v1
kind: Service
metadata:
  name: middleware
  namespace: default
  labels:
    app: middleware
    tier: middleware
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: middleware
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware
  namespace: default
  labels:
    app: middleware
    tier: middleware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: middleware
  template:
    metadata:
      labels:
        app: middleware
        tier: middleware
    spec:
      containers:
        - name: middleware
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Middleware starting..."
              while true; do
                sleep 3600
              done
          env:
            - name: BACKEND_URL
              value: "http://backend:8080"
