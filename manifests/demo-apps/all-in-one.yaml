# Backend service - Returns simple responses
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
    tier: backend
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: hashicorp/http-echo:latest
          args:
            - "-text=Hello from Backend!"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
              name: http
---
# Middleware service - Proxies requests to backend
---
apiVersion: v1
kind: Service
metadata:
  name: middleware
  namespace: default
  labels:
    app: middleware
    tier: middleware
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: middleware
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware
  namespace: default
  labels:
    app: middleware
    tier: middleware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: middleware
  template:
    metadata:
      labels:
        app: middleware
        tier: middleware
    spec:
      containers:
        - name: middleware
          image: hashicorp/http-echo:latest
          args:
            - "-text=Middleware -> Backend"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
              name: http
---
# Frontend service - Proxies requests to middleware
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
    tier: frontend
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      nodePort: 30080
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: hashicorp/http-echo:latest
          args:
            - "-text=Frontend -> Middleware -> Backend"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
              name: http
